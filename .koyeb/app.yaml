name: billing-system-mongodb

services:
  - name: web
    build:
      type: docker
      dockerfile: Dockerfile
    
    ports:
      - port: 8000
        protocol: http
    
    routes:
      - path: /
        port: 8000
    
    env:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8000"
    
    scaling:
      min: 1
      max: 1
    
    regions:
      - fra
    
    instance_type: nano
    
    health_checks:
      - type: http
        port: 8000
        path: /health
        interval: 30
        timeout: 10
        grace_period: 90
